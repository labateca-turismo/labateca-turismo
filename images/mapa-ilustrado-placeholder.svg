<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <!-- Textura de papel/pergamino -->
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency=".65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <!-- Sombra suave para etiquetas -->
    <filter id="lbl-shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#f6efe3" flood-opacity=".9"/>
    </filter>
  </defs>

  <!-- ── FONDO PERGAMINO ────────────────────────────── -->
  <rect width="1000" height="700" fill="#f0e8d6"/>
  <!-- Gradiente sutil de profundidad -->
  <radialGradient id="bgGrad" cx="50%" cy="55%" r="65%">
    <stop offset="0%" stop-color="#f6efe3"/>
    <stop offset="100%" stop-color="#e8dcc8"/>
  </radialGradient>
  <rect width="1000" height="700" fill="url(#bgGrad)" opacity=".8"/>

  <!-- ── LÍNEAS TOPOGRÁFICAS ────────────────────────── -->
  <!-- Curvas de nivel alrededor del pueblo (500,380) -->
  <g fill="none" stroke="#c9b99a" stroke-width="1" opacity=".55">
    <ellipse cx="500" cy="390" rx="60" ry="40"/>
    <ellipse cx="500" cy="390" rx="120" ry="80"/>
    <ellipse cx="500" cy="390" rx="185" ry="125"/>
    <ellipse cx="500" cy="390" rx="255" ry="170"/>
    <ellipse cx="500" cy="390" rx="330" ry="215"/>
    <!-- Curvas del páramo (norte) -->
    <path d="M 200 0 Q 400 60 500 80 Q 620 60 800 0" stroke-width="1.2"/>
    <path d="M 150 40 Q 380 110 500 130 Q 640 110 850 40" stroke-width="1.2"/>
    <path d="M 120 90 Q 360 160 500 180 Q 660 160 880 90" stroke-width="1.2"/>
    <path d="M 100 145 Q 340 210 500 228 Q 680 210 900 145" stroke-width="1.2"/>
  </g>

  <!-- ── PÁRAMO / MONTAÑAS (norte) ─────────────────── -->
  <!-- Silhouette montañas principales -->
  <path d="M 0 220 L 80 130 L 150 185 L 220 85 L 310 155 L 380 60 L 450 130 L 500 80 L 560 125 L 620 55 L 700 145 L 770 90 L 840 155 L 920 100 L 1000 165 L 1000 240 Z"
        fill="#2d6149" opacity=".18"/>
  <!-- Segunda capa montañas -->
  <path d="M 0 255 L 100 180 L 180 215 L 260 155 L 340 200 L 420 160 L 490 185 L 540 165 L 600 188 L 680 158 L 750 195 L 820 168 L 900 198 L 1000 215 L 1000 270 Z"
        fill="#1f4a39" opacity=".22"/>
  <!-- Frailejones (símbolos) -->
  <g fill="#2d6149" opacity=".55">
    <text x="340" y="172" font-size="18" text-anchor="middle">❋</text>
    <text x="390" y="158" font-size="14" text-anchor="middle">❋</text>
    <text x="430" y="170" font-size="16" text-anchor="middle">❋</text>
    <text x="470" y="162" font-size="12" text-anchor="middle">❋</text>
    <text x="530" y="168" font-size="15" text-anchor="middle">❋</text>
    <text x="580" y="158" font-size="13" text-anchor="middle">❋</text>
    <text x="640" y="172" font-size="17" text-anchor="middle">❋</text>
  </g>

  <!-- ── ÁREAS NATURALES (vegetación) ──────────────── -->
  <!-- Manchas de bosque -->
  <g fill="#2d6149" opacity=".12">
    <ellipse cx="200" cy="450" rx="90" ry="65"/>
    <ellipse cx="160" cy="510" rx="70" ry="50"/>
    <ellipse cx="280" cy="520" rx="80" ry="55"/>
    <ellipse cx="750" cy="480" rx="75" ry="50"/>
    <ellipse cx="820" cy="430" rx="60" ry="45"/>
    <ellipse cx="870" cy="510" rx="65" ry="45"/>
    <ellipse cx="120" cy="380" rx="65" ry="50"/>
    <ellipse cx="880" cy="330" rx="55" ry="40"/>
  </g>
  <!-- Árboles símbolos -->
  <g font-size="20" text-anchor="middle" fill="#2d6149" opacity=".5">
    <text x="190" y="460">🌲</text>
    <text x="155" y="515">🌲</text>
    <text x="285" y="525">🌲</text>
    <text x="240" y="490">🌿</text>
    <text x="755" y="485">🌲</text>
    <text x="825" y="440">🌲</text>
    <text x="868" y="515">🌲</text>
    <text x="118" y="385">🌿</text>
    <text x="885" y="338">🌿</text>
  </g>

  <!-- ── RÍOS / QUEBRADAS ───────────────────────────── -->
  <!-- Río principal (sureste a noroeste) -->
  <path d="M 950 580 Q 820 540 720 490 Q 620 450 520 420 Q 450 400 380 420 Q 320 440 260 490 Q 210 530 180 580 Q 155 620 140 680"
        fill="none" stroke="#7bb3d4" stroke-width="4" stroke-linecap="round" opacity=".65"/>
  <!-- Quebrada Los Monos -->
  <path d="M 400 700 Q 360 640 320 580 Q 300 540 310 490"
        fill="none" stroke="#7bb3d4" stroke-width="2.5" stroke-linecap="round" opacity=".55"/>
  <!-- Afluente pequeño al norte -->
  <path d="M 500 320 Q 480 360 490 390"
        fill="none" stroke="#7bb3d4" stroke-width="2" stroke-linecap="round" opacity=".45"/>

  <!-- ── CAMINOS / VÍAS ─────────────────────────────── -->
  <!-- Vía principal: pueblo → sureste (hacia Cúcuta) -->
  <path d="M 495 380 Q 560 400 650 420 Q 750 450 870 510 Q 940 550 990 590"
        fill="none" stroke="#bd5d34" stroke-width="3" stroke-dasharray="10,6" stroke-linecap="round" opacity=".55"/>
  <!-- Vía: pueblo → noroeste (hacia La Lirgua) -->
  <path d="M 490 385 Q 430 410 370 440 Q 300 475 240 510 Q 215 530 220 545"
        fill="none" stroke="#bd5d34" stroke-width="2.5" stroke-dasharray="8,5" stroke-linecap="round" opacity=".5"/>
  <!-- Vía: pueblo → norte (hacia páramo) -->
  <path d="M 500 375 Q 490 320 480 260 Q 460 200 430 155 Q 415 130 400 110"
        fill="none" stroke="#bd5d34" stroke-width="2" stroke-dasharray="6,5" stroke-linecap="round" opacity=".45"/>
  <!-- Vía: pueblo → noreste (mirador) -->
  <path d="M 510 375 Q 545 340 575 300 Q 610 255 620 210 Q 630 180 625 150"
        fill="none" stroke="#c97040" stroke-width="2" stroke-dasharray="6,5" stroke-linecap="round" opacity=".4"/>
  <!-- Sendero: balneario -->
  <path d="M 485 390 Q 420 430 360 480 Q 310 515 240 490"
        fill="none" stroke="#b07040" stroke-width="1.5" stroke-dasharray="4,4" stroke-linecap="round" opacity=".4"/>

  <!-- ── CASCO URBANO (cuadrícula) ─────────────────── -->
  <rect x="460" y="352" width="80" height="65" rx="6" fill="#e8dcc8" stroke="#b09a7a" stroke-width="1.5" opacity=".9"/>
  <!-- Manzanas -->
  <g fill="#d4a23f" opacity=".25">
    <rect x="465" y="357" width="16" height="13" rx="2"/>
    <rect x="485" y="357" width="16" height="13" rx="2"/>
    <rect x="505" y="357" width="16" height="13" rx="2"/>
    <rect x="525" y="357" width="10" height="13" rx="2"/>
    <rect x="465" y="374" width="16" height="13" rx="2"/>
    <rect x="505" y="374" width="16" height="13" rx="2"/>
    <rect x="525" y="374" width="10" height="13" rx="2"/>
    <rect x="465" y="391" width="16" height="12" rx="2"/>
    <rect x="485" y="391" width="16" height="12" rx="2"/>
    <rect x="505" y="391" width="16" height="12" rx="2"/>
    <rect x="525" y="391" width="10" height="12" rx="2"/>
  </g>
  <!-- Parque principal (centro) -->
  <rect x="483" y="372" width="20" height="14" rx="3" fill="#2d6149" opacity=".5"/>
  <text x="493" y="382" font-size="7" text-anchor="middle" fill="#f6efe3" font-weight="bold">P</text>
  <!-- Iglesia (★) -->
  <text x="493" y="360" font-size="10" text-anchor="middle" fill="#bd5d34">†</text>

  <!-- ── VOLCÁN / MONTAÑA EMBLEMÁTICA ──────────────── -->
  <g transform="translate(400, 105)">
    <path d="M 0 50 L 18 0 L 36 50 Z" fill="#bd5d34" opacity=".75"/>
    <path d="M 5 50 L 18 12 L 31 50 Z" fill="#16352a" opacity=".4"/>
    <!-- Fumarola -->
    <path d="M 18 0 Q 14 -10 18 -18 Q 22 -10 18 0" fill="none" stroke="#c9b99a" stroke-width="1.5" opacity=".6"/>
  </g>

  <!-- ── LAGUNA NEGRA ───────────────────────────────── -->
  <ellipse cx="350" cy="185" rx="22" ry="14" fill="#4a7a9b" opacity=".55"/>
  <ellipse cx="350" cy="185" rx="18" ry="10" fill="#3a6a8b" opacity=".4"/>

  <!-- ── CASCADA LA LIRGUA ──────────────────────────── -->
  <!-- Símbolo cascada -->
  <g transform="translate(215, 525)">
    <path d="M 0 0 Q 3 8 0 16 Q -3 24 0 32" fill="none" stroke="#7bb3d4" stroke-width="2.5" opacity=".8"/>
    <path d="M 6 2 Q 8 10 6 18 Q 4 26 6 34" fill="none" stroke="#7bb3d4" stroke-width="2" opacity=".65"/>
    <ellipse cx="3" cy="36" rx="8" ry="4" fill="#7bb3d4" opacity=".45"/>
  </g>

  <!-- ── ROSA DE LOS VIENTOS ────────────────────────── -->
  <g transform="translate(940, 80)" opacity=".7">
    <!-- Círculo fondo -->
    <circle cx="0" cy="0" r="32" fill="#f0e8d6" stroke="#c9b99a" stroke-width="1.5"/>
    <!-- N -->
    <path d="M 0 -28 L -5 -14 L 0 -18 L 5 -14 Z" fill="#16352a"/>
    <!-- S -->
    <path d="M 0 28 L -5 14 L 0 18 L 5 14 Z" fill="#c9b99a"/>
    <!-- E -->
    <path d="M 28 0 L 14 -5 L 18 0 L 14 5 Z" fill="#c9b99a"/>
    <!-- O -->
    <path d="M -28 0 L -14 -5 L -18 0 L -14 5 Z" fill="#c9b99a"/>
    <!-- Círculo centro -->
    <circle cx="0" cy="0" r="4" fill="#bd5d34"/>
    <text x="0" y="-34" text-anchor="middle" font-size="11" font-weight="bold" fill="#16352a" font-family="Georgia,serif">N</text>
  </g>

  <!-- ── TÍTULO DEL MAPA ────────────────────────────── -->
  <!-- Marco título -->
  <rect x="28" y="24" width="280" height="72" rx="10" fill="#f6efe3" stroke="#c9b99a" stroke-width="1.5" opacity=".92"/>
  <text x="46" y="52" font-size="22" font-weight="bold" fill="#16352a" font-family="Georgia,'Times New Roman',serif" letter-spacing="-0.5">Labateca</text>
  <text x="46" y="68" font-size="11" fill="#bd5d34" font-family="Georgia,serif" font-style="italic">Volcanes de Dios · Norte de Santander</text>
  <text x="46" y="83" font-size="9" fill="#8a7a6a" font-family="'Helvetica Neue',Arial,sans-serif">Mapa ilustrado · arte en proceso</text>

  <!-- ── LEYENDA ─────────────────────────────────────── -->
  <rect x="28" y="590" width="200" height="88" rx="8" fill="#f6efe3" stroke="#c9b99a" stroke-width="1.2" opacity=".88"/>
  <text x="44" y="610" font-size="10" font-weight="bold" fill="#16352a" font-family="'Helvetica Neue',Arial,sans-serif" letter-spacing=".08em" text-transform="uppercase">LEYENDA</text>
  <!-- Ítems leyenda -->
  <circle cx="44" cy="625" r="6" fill="#bd5d34" stroke="#f6efe3" stroke-width="1.5"/>
  <text x="56" y="629" font-size="9" fill="#16352a" font-family="'Helvetica Neue',Arial,sans-serif">Lugar turístico</text>
  <line x1="38" y1="640" x2="52" y2="640" stroke="#bd5d34" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="56" y="644" font-size="9" fill="#16352a" font-family="'Helvetica Neue',Arial,sans-serif">Camino / Vía</text>
  <line x1="38" y1="655" x2="52" y2="655" stroke="#7bb3d4" stroke-width="3" stroke-linecap="round"/>
  <text x="56" y="659" font-size="9" fill="#16352a" font-family="'Helvetica Neue',Arial,sans-serif">Río / Quebrada</text>
  <ellipse cx="44" cy="671" rx="7" ry="4" fill="#4a7a9b" opacity=".6"/>
  <text x="56" y="675" font-size="9" fill="#16352a" font-family="'Helvetica Neue',Arial,sans-serif">Laguna</text>

  <!-- ── ESCALA (decorativa) ────────────────────────── -->
  <g transform="translate(780, 628)" opacity=".7">
    <line x1="0" y1="0" x2="80" y2="0" stroke="#16352a" stroke-width="1.5"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#16352a" stroke-width="1.5"/>
    <line x1="40" y1="-3" x2="40" y2="3" stroke="#16352a" stroke-width="1"/>
    <line x1="80" y1="-5" x2="80" y2="5" stroke="#16352a" stroke-width="1.5"/>
    <text x="0" y="-9" text-anchor="middle" font-size="8" fill="#16352a" font-family="'Helvetica Neue',Arial,sans-serif">0</text>
    <text x="40" y="-9" text-anchor="middle" font-size="8" fill="#16352a" font-family="'Helvetica Neue',Arial,sans-serif">~2 km</text>
    <text x="80" y="-9" text-anchor="middle" font-size="8" fill="#16352a" font-family="'Helvetica Neue',Arial,sans-serif">~4 km</text>
    <rect x="0" y="0" width="40" height="5" fill="#16352a" opacity=".7"/>
    <rect x="40" y="0" width="40" height="5" fill="#f6efe3" stroke="#16352a" stroke-width=".5"/>
  </g>

  <!-- ── BORDE DECORATIVO ───────────────────────────── -->
  <rect x="8" y="8" width="984" height="684" rx="14" fill="none" stroke="#c9b99a" stroke-width="2" opacity=".55"/>
  <rect x="14" y="14" width="972" height="672" rx="11" fill="none" stroke="#c9b99a" stroke-width=".8" opacity=".35"/>

  <!-- ── NOTA PLACEHOLDER ───────────────────────────── -->
  <rect x="330" y="642" width="340" height="36" rx="7" fill="#16352a" opacity=".75"/>
  <text x="500" y="665" text-anchor="middle" font-size="11" fill="#d4a23f" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="600" letter-spacing=".04em">
    ✏ Aquí irá el mapa ilustrado oficial de Labateca
  </text>
</svg>
